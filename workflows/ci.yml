name: CI — AEP Instruire Online

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint + Type-check + Tests ──────────────────────────
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aep_test
          POSTGRES_USER: aep_user
          POSTGRES_PASSWORD: aep_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: postgresql://aep_user:aep_pass@localhost:5432/aep_test
      JWT_SECRET: ci-test-secret-not-for-production
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run DB migrations
        run: npx prisma migrate deploy

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unit & integration tests
        run: npm test -- --coverage --ci

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── Build ──────────────────────────────────────────────
  build:
    name: Build application
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_PROVIDER: postgresql
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          JWT_SECRET: build-placeholder-secret
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  # ── Docker build (doar pe main) ────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t aep-instruire-online:${{ github.sha }} .
      - name: Test Docker image
        run: |
          docker run --rm -e DATABASE_URL=postgresql://x:x@localhost/x \
            -e JWT_SECRET=test -e NODE_ENV=production \
            aep-instruire-online:${{ github.sha }} node -e "console.log('OK')"
