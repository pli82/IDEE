version: '3.9'

services:
  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aep_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aep_instruire
      POSTGRES_USER: aep_user
      POSTGRES_PASSWORD: aep_pass
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aep_user -d aep_instruire']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MailHog (email dev) ───────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: aep_mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'  # SMTP
      - '8025:8025'  # Web UI: http://localhost:8025

  # ── MinIO (stocare fișiere producție) ─────────────────────
  minio:
    image: minio/minio:latest
    container_name: aep_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'  # Console: http://localhost:9001
    volumes:
      - minio_data:/data

  # ── Aplicație Next.js ─────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aep_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: postgresql://aep_user:aep_pass@postgres:5432/aep_instruire
      EMAIL_HOST: mailhog
      EMAIL_PORT: 1025
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - '3000:3000'
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  minio_data:
  uploads_data:
